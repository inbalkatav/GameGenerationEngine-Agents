# Render deployment configuration.
# When you connect this repo to Render, it reads this file and sets up the
# web service automatically. You still have to set the two secret env vars
# (ANTHROPIC_API_KEY and HF_TOKEN) manually in the dashboard.

services:
  - type: web
    name: storybased-game-maker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server-side/web_server_v2.py
    envVars:
      # API keys must be set manually in the Render dashboard for security.
      # The two below will appear with empty values — go to your service →
      # Environment → set their real values from your local .env.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      # Render sets $PORT automatically; web_server_v2.py reads it.
